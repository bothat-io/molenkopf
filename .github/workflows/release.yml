name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run validation only"
        default: "true"
        required: true
      publish_npm:
        description: "Also publish the validated tarball to npm"
        default: "false"
        required: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm run bootstrap
      - run: npm test
      - name: Dashboard E2E
        run: npm run e2e
      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          expected="v$(node -p "require('./package.json').version")"
          test "$GITHUB_REF_NAME" = "$expected"
      - name: Pack and smoke installed tarball
        run: |
          npm run prepack
          tarball="$(node scripts/release-pack.js)"
          tmp="$(mktemp -d)"
          npm --prefix "$tmp" init -y
          npm --prefix "$tmp" install "$PWD/$tarball"
          "$tmp/node_modules/.bin/molenkopf" --help
          MOLENKOPF_DATA_DIR="$tmp/data" "$tmp/node_modules/.bin/molenkopf" self-test
          mkdir -p release-artifacts
          cp "$tarball" release-artifacts/
          (cd release-artifacts && sha256sum "$tarball" > molenkopf.tgz.sha256 && sha256sum -c molenkopf.tgz.sha256)
      - uses: actions/upload-artifact@v4
        with:
          name: molenkopf-npm-package
          path: release-artifacts/
          if-no-files-found: error
      - run: docker build --pull -t molenkopf:ci .
      - name: Smoke final image
        run: |
          docker run -d --name molenkopf-ci molenkopf:ci
          trap 'docker rm -f molenkopf-ci' EXIT
          ready=0
          for i in $(seq 1 30); do
            if docker exec molenkopf-ci node -e "fetch('http://127.0.0.1:8787/__molenkopf/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"; then
              ready=1
              break
            fi
            sleep 1
          done
          if [ "$ready" = "1" ]; then
            docker exec -i molenkopf-ci node - <<'NODE'
          const base = 'http://127.0.0.1:8787';
          const before = await fetch(`${base}/__molenkopf/me`).then((r) => r.json());
          if (!before.needsSetup) throw new Error('expected first-run setup');
          const setup = await fetch(`${base}/__molenkopf/setup-admin`, {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({ username: 'admin', password: 'admin-secret' })
          });
          if (!setup.ok) throw new Error(`setup failed: ${setup.status}`);
          const cookie = setup.headers.get('set-cookie')?.split(';')[0];
          const after = await fetch(`${base}/__molenkopf/me`, { headers: { cookie } }).then((r) => r.json());
          if (after.user?.id !== 'admin') throw new Error('authenticated setup session missing');
          NODE
            exit 0
          fi
          docker logs molenkopf-ci
          exit 1
      - name: Save smoked Docker image
        run: |
          mkdir -p docker-artifacts
          docker image inspect molenkopf:ci --format '{{.Id}}' > docker-artifacts/image-id.txt
          docker save molenkopf:ci | gzip > docker-artifacts/molenkopf-image.tar.gz
          (cd docker-artifacts && sha256sum image-id.txt molenkopf-image.tar.gz > molenkopf-image.sha256)
      - uses: actions/upload-artifact@v4
        with:
          name: molenkopf-docker-image
          path: docker-artifacts/
          if-no-files-found: error

  publish-npm:
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && startsWith(github.ref, 'refs/tags/') && github.event.inputs.dry_run == 'false' && github.event.inputs.publish_npm == 'true'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - uses: actions/download-artifact@v4
        with:
          name: molenkopf-npm-package
          path: release-artifacts
      - name: Publish validated npm tarball
        run: |
          cd release-artifacts
          sha256sum -c molenkopf.tgz.sha256
          tarball="$(awk '{print $2}' molenkopf.tgz.sha256)"
          npm publish "$tarball"

  publish-docker:
    needs: validate
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'false'))
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@v4
        with:
          name: molenkopf-docker-image
          path: docker-artifacts
      - name: Load validated Docker image
        run: |
          cd docker-artifacts
          sha256sum -c molenkopf-image.sha256
          gunzip -c molenkopf-image.tar.gz | docker load
          test "$(cat image-id.txt)" = "$(docker image inspect molenkopf:ci --format '{{.Id}}')"
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
      - name: Push validated Docker image
        run: |
          while IFS= read -r tag; do
            test -n "$tag" || continue
            docker tag molenkopf:ci "$tag"
            docker push "$tag"
          done <<'TAGS'
          ${{ steps.meta.outputs.tags }}
          TAGS
