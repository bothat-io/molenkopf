name: preview

on:
  push:
    branches: [preview]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker-preview:
    if: github.ref == 'refs/heads/preview'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Smoke preview image
        run: npm run smoke:docker
        env:
          MOLENKOPF_DOCKER_IMAGE: molenkopf:preview
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push preview image
        run: |
          image="ghcr.io/${{ github.repository }}"
          short_sha="${GITHUB_SHA::7}"
          docker tag molenkopf:preview "$image:preview"
          docker tag molenkopf:preview "$image:preview-$short_sha"
          docker push "$image:preview"
          docker push "$image:preview-$short_sha"
