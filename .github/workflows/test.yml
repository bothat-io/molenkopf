name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    container:
      image: node:24-bookworm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bootstrap dependencies
        run: npm run bootstrap

      - name: Test
        run: npm test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Cache Cypress binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('packages/dashboard/package-lock.json') }}

      - name: Bootstrap dependencies
        run: npm run bootstrap

      - name: Verify Cypress runner
        run: npm --prefix packages/dashboard exec cypress verify

      - name: E2E
        run: npm run e2e
