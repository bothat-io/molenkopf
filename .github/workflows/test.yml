name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    container:
      image: node:24-bookworm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bootstrap dependencies
        run: npm run bootstrap

      - name: Test
        run: npm test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Bootstrap dependencies
        env:
          CYPRESS_INSTALL_BINARY: "0"
        run: npm run bootstrap

      - name: E2E
        run: npm run e2e
