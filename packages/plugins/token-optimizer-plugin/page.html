<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Token optimizer</title>
<style>
  :root{
    --bg:#f4f1ea;--card:#fbf9f4;--line:#e3ddd1;--ink:#1c1a17;--muted:#746d63;
    --accent:#087a68;--soft:#d9f3ed;--warn:#9b4a00;
    --font-sans:"Segoe UI",Arial,sans-serif;
    --font-serif:Georgia,"Times New Roman",serif
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font-sans);line-height:1.45}
  .wrap{max-width:1440px;margin:0 auto;padding:34px 28px 48px}
  header{display:flex;justify-content:space-between;gap:18px;align-items:flex-start;margin-bottom:22px}
  h1{font-family:var(--font-serif);font-weight:650;font-size:30px;margin:0 0 4px}
  .sub,.muted{color:var(--muted);font-size:13px}
  .state{border:1px solid var(--line);border-radius:8px;background:var(--card);padding:10px 12px;min-width:260px}
  .statusbox{display:grid;gap:8px}
  .actions{display:flex;justify-content:flex-end}
  button{border:1px solid var(--line);border-radius:8px;background:#fffdf8;color:var(--ink);padding:7px 10px;font-weight:700;cursor:pointer}
  .badge{display:inline-flex;align-items:center;border-radius:999px;background:var(--soft);color:#075f54;font-size:11px;font-weight:700;padding:3px 8px;margin-left:6px}
  .grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}
  .panel,.metric{min-width:0;background:var(--card);border:1px solid var(--line);border-radius:10px;box-shadow:0 8px 22px rgba(28,26,23,.06)}
  .metric{padding:16px}
  .metric .k,.label{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.08em}
  .metric .v{font-family:var(--font-serif);font-size:31px;font-weight:650;margin-top:7px}
  .panel{padding:18px;margin-top:14px}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .list{display:grid;gap:10px}
  .row{border:1px solid var(--line);border-radius:8px;background:#fffdf8;padding:12px}
  .row-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
  .row-title{font-weight:700}
  .pill{display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:999px;background:#fff;padding:4px 10px;font-size:12px;font-weight:600}
  .warn{color:var(--warn)}
  .empty{border:1px dashed var(--line);border-radius:10px;padding:18px;color:var(--muted);background:#fffdf8}
  .mono{font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:12px;overflow-wrap:anywhere}
  .stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-top:10px}
  .stats b{display:block;font-size:13px}
  .stats span{font-size:12px;color:var(--muted)}
  @media(max-width:980px){
    .grid,.two,.stats{grid-template-columns:1fr}
    header{display:block}
    .state{margin-top:12px}
  }
</style>
</head>
<body>
<main class="wrap">
  <header>
    <div>
      <h1>Token optimizer</h1>
      <div class="sub">Observe token usage, repeated context, budget pressure, and safe recommendations without mutating traffic.</div>
    </div>
    <div class="statusbox"><div class="state" id="state">Loading workspace...</div><div class="actions"><button id="refresh" type="button">Refresh snapshot</button></div></div>
  </header>
  <section class="grid" id="metrics"></section>
  <section class="two">
    <div class="panel"><h2>Buckets</h2><div id="buckets"></div></div>
    <div class="panel"><h2>Budget and unavailable metrics</h2><div id="budget"></div></div>
  </section>
  <section class="panel"><h2>Repeated context</h2><div id="repeated"></div></section>
  <section class="panel"><h2>Recommendations</h2><div id="recommendations"></div></section>
</main>
<script>
  const DATA_URL="/__molenkopf/plugins/token-optimizer-plugin/data";
  const $=(id)=>document.getElementById(id);
  const esc=(v)=>String(v??"").replace(/[&<>"]/g,(c)=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
  const num=(v)=>Number(v||0).toLocaleString("en-US");
  const metricText=(metric,unit="")=>metric&&metric.state==="available"?`${num(metric.value)}${unit}`:`${metric?.reason||"unavailable"}`;
  async function loadData(){
    try{
      const r=await fetch(DATA_URL);
      if(!r.ok) return { loadError:`HTTP ${r.status}` };
      return await r.json();
    }catch(error){
      return { loadError:String(error.message||error||"request failed") };
    }
  }
  function row(title,meta,body){
    return `<div class="row"><div class="row-top"><div><div class="row-title">${esc(title)}</div><div class="muted">${esc(meta||"")}</div></div>${body?.badge?`<span class="pill${body.badgeWarn?" warn":""}">${esc(body.badge)}</span>`:""}</div>${body?.html||""}</div>`;
  }
  function stats(items){
    return `<div class="stats">${items.map(([label,value])=>`<div><span>${esc(label)}</span><b>${esc(value)}</b></div>`).join("")}</div>`;
  }
function renderMetrics(data){
  const observations=data.observations||{}, budgets=data.budgets||{};
  const cards=[
    ["Requests",observations.requests],["Input tokens",observations.inputTokens],
    ["Output tokens",observations.outputTokens],["Saved tokens",observations.savedTokens],
    ["Budget pressure",budgets.pressure||"low"],["Cache savings",metricText(data.cacheSavings," tokens")],
    ["Estimated cost",metricText(data.estimatedCostEur," EUR")],["Recommendations",(data.recommendations||[]).length]
  ];
  $("metrics").innerHTML=cards.map(([k,v])=>`<div class="metric"><div class="k">${esc(k)}</div><div class="v">${esc(v)}</div></div>`).join("");
}
function renderBuckets(items){
  if(!items?.length){
    $("buckets").innerHTML='<div class="empty">No grouped token buckets observed yet.</div>';
    return;
  }
  $("buckets").innerHTML=`<div class="list">${items.slice(0,8).map((item)=>row(item.label,item.id,{html:stats([["Requests",num(item.requests)],["Input",num(item.inputTokens)],["Output",num(item.outputTokens)]])})).join("")}</div>`;
}
function renderBudget(data){
  const budgets=data.budgets||{}, warnings=budgets.warnings||[];
  const rows=[
    row("Budget pressure","Current summary",{badge:budgets.pressure||"low",badgeWarn:budgets.pressure==="high"}),
    row("Total tokens","Observed token total",{html:`<div class="mono">${esc(metricText(budgets.totalTokens," tokens"))}</div>`}),
    row("Budget limit","Configured limit or fallback",{html:`<div class="mono">${esc(metricText(budgets.budgetLimit," tokens"))}</div>`}),
    row("Cache savings","Availability",{html:`<div class="mono">${esc(metricText(data.cacheSavings," tokens"))}</div>`}),
    row("Estimated cost","Availability",{html:`<div class="mono">${esc(metricText(data.estimatedCostEur," EUR"))}</div>`})
  ];
  if(warnings.length) rows.push(row("Warnings","Current warnings",{html:`<div class="list">${warnings.map((item)=>`<div class="pill warn">${esc(item)}</div>`).join("")}</div>`}));
  $("budget").innerHTML=`<div class="list">${rows.join("")}</div>`;
}
function renderRepeated(items){
  if(!items?.length){
    $("repeated").innerHTML='<div class="empty">No repeated context pattern detected yet.</div>';
    return;
  }
  $("repeated").innerHTML=`<div class="list">${items.slice(0,10).map((item)=>row(item.project,item.endpoint,{html:stats([["Requests",num(item.requests)],["Repeated input",num(item.repeatedInputTokens)],["Scope",item.endpoint]])})).join("")}</div>`;
}
function renderRecommendations(items){
  if(!items?.length){
    $("recommendations").innerHTML='<div class="empty">No recommendations yet.</div>';
    return;
  }
  $("recommendations").innerHTML=`<div class="list">${items.map((item)=>row(item.kind,item.id,{badge:item.severity,badgeWarn:item.severity!=="low",html:`<div class="muted">${esc(item.summary)}</div>`})).join("")}</div>`;
}
async function load(){
  const button=$("refresh");
  button.disabled=true;
  try{
    const data=await loadData();
    if(data.loadError){
      $("state").innerHTML=`Data unavailable <span class="badge">error</span><div class="muted">${esc(data.loadError)}</div>`;
      ["metrics","buckets","budget","repeated","recommendations"].forEach((id)=>$(id).innerHTML='<div class="empty warn">Plugin data unavailable. Refresh after the proxy returns a valid data response.</div>');
      return;
    }
    $("state").innerHTML=`Observe and recommend <span class="badge">read only</span><div class="muted">This workspace reports budgets, repeated context, and unavailable metrics without changing routing or request bodies.</div>`;
    renderMetrics(data);
    renderBuckets(data.buckets);
    renderBudget(data);
    renderRepeated(data.repeatedContext);
    renderRecommendations(data.recommendations);
  }finally{button.disabled=false}
}
  $("refresh").addEventListener("click",load);
  load();
</script>
</body>
</html>
